name: Dev CI/CD Pipeline

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 (Dev)
        uses: appleboy/ssh-action@v1.0.0
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: SECRET_KEY,POSTGRES_PASSWORD,GH_TOKEN,GITHUB_REPO
          script: |
            APP_DIR=~/book_shop_dev

            if [ -d "$APP_DIR/.git" ]; then
              cd $APP_DIR
              git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPO}.git
              git fetch origin
              git reset --hard origin/dev
            else
              git clone -b dev https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPO}.git $APP_DIR
              cd $APP_DIR
            fi

            cd $APP_DIR

            printf 'SECRET_KEY=%s\nPOSTGRES_PASSWORD=%s\n' \
              "${SECRET_KEY}" "${POSTGRES_PASSWORD}" > .env

            docker compose -f docker-compose.dev.yml down --remove-orphans
            docker compose -f docker-compose.dev.yml up -d --build

            sleep 10
            docker compose -f docker-compose.dev.yml exec -T web python manage.py migrate --noinput

            echo "Dev deployment complete!"
