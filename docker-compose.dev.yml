version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - dev_network

  web:
    image: book_shop:dev
    env_file: .env
    ports:
      - "8001:8000"
    depends_on:
      - db
    networks:
      - dev_network

networks:
  dev_network:
    name: dev_network

volumes:
  postgres_data_dev:
    name: postgres_data_dev
