version: '3.8'

services:
  db_dev:
    image: postgres:15
    env_file:
      - .env.dev
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    container_name: bookshop_db_dev

  backend_dev:
    build: .
    env_file:
      - .env.dev
    ports:
      - "8000:8000"
    depends_on:
      - db_dev
    container_name: bookshop_backend_dev
    command: >
      sh -c "sleep 3 &&
             python manage.py migrate &&
             gunicorn book_shop.wsgi:application --bind 0.0.0.0:8000"

volumes:
  postgres_data_dev:
