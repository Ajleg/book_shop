version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_test:/var/lib/postgresql/data
    networks:
      - test_network

  web:
    image: ${DOCKERHUB_USERNAME}/book_shop:${IMAGE_TAG}
    env_file: .env
    ports:
      - "8002:8000"
    depends_on:
      - db
    networks:
      - test_network

networks:
  test_network:
    name: test_network

volumes:
  postgres_data_test:
    name: postgres_data_test
